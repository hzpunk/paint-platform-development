# Nginx configuration for paint-platform (Next.js application)
# Place this file in /etc/nginx/conf.d/paint-platform.conf (or sites-available)

# Gzip Compression settings
gzip on;
gzip_proxied any;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
gzip_vary on;
gzip_disable "msie6";

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP - Server block (Port 80)
# This block must be active first so Certbot can verify the domain and issue certificates.
server {
    listen 80;
    listen [::]:80;
    server_name kraskaprof.ru www.kraskaprof.ru; # Replace with your domain

    # ACME-challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    client_max_body_size 50M;
}

