# Nginx configuration for paint-platform (Next.js application)
# Place this file in /etc/nginx/sites-available/paint-platform
# Then create a symlink: ln -s /etc/nginx/sites-available/paint-platform /etc/nginx/sites-enabled/

# Gzip Compression settings
gzip on;
gzip_proxied any;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
gzip_vary on;
gzip_disable "msie6";

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kraskaprof.ru www.kraskaprof.ru; # Replace with your domain

    # ACME-challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Production server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kraskaprof.ru www.kraskaprof.ru; # Replace with your domain

    # SSL Certificates (managed by Certbot / Let's Encrypt)
    # Uncomment and verify paths once certificates are installed
    # ssl_certificate /etc/letsencrypt/live/kraskaprof.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/kraskaprof.ru/privkey.pem;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # Session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # Client body size limit (useful for product image uploads in admin panel)
    client_max_body_size 50M;

    # Proxy Next.js requests
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        
        # WebSockets support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for faster response
        proxy_buffering off;
    }

    # Static assets cache control (Next.js optimized static files)
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js static public assets cache control
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|webp|mp4|webm)$ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, must-revalidate";
    }
}
